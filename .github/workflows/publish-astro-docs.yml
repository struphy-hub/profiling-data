name: Build and publish Astro docs

on:
  push:
    branches: [ main, fix-docs-build ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # - name: Install scope-profiler
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install scope-profiler

      - name: Generate figures
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p docs/public/figures
          scope-profiler-pproc 20260707T131013Z-1237062c-diocotron_poisson_scaling-fortran/*.h5 --ranks 0 -o docs/public/figures

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (docs)
        working-directory: docs
        run: npm ci

      - name: Build site (docs)
        working-directory: docs
        run: npm run build --if-present

      - name: Copy build to docs/
        run: |
          # Keep docs sources/tooling and copy compiled output on top for publishing.
          cp -a docs/dist/. docs/
          rm -rf docs/dist

      - name: Commit and push docs/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          # If there are no staged changes, exit successfully
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(docs): update site [skip ci]"
          git push
