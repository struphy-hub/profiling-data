name: Build and publish Astro docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build --if-present

      - name: Copy build to docs/
        run: |
          rm -rf docs
          mkdir -p docs
          if [ -d dist ]; then
            cp -a dist/. docs/
          elif [ -d build ]; then
            cp -a build/. docs/
          else
            echo "No dist or build directory found"
            exit 1
          fi

      - name: Commit and push docs/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          # If there are no staged changes, exit successfully
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(docs): update site [skip ci]"
          git push
