name: Build and deploy Astro docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # - name: Install scope-profiler
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install scope-profiler

      - name: Generate figures
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p docs/public/figures
          scope-profiler-pproc 20260707T131013Z-1237062c-diocotron_poisson_scaling-fortran/*.h5 --ranks 0 -o docs/public/figures

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (docs)
        working-directory: docs
        run: npm ci

      - name: Build site (docs)
        working-directory: docs
        run: npm run build --if-present

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
