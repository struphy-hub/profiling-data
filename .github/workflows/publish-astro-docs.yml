name: Build and publish Astro docs

on:
  push:
    branches: [ main, fix-docs-build ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # - name: Install scope-profiler
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install scope-profiler

      - name: Generate figures
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p _generated_figures docs/figures
          scope-profiler-pproc 20260707T131013Z-1237062c-diocotron_poisson_scaling-fortran/*.h5 --ranks 0 -o _generated_figures
          cp -a _generated_figures/. docs/figures/
          if [ -d docs/public ] || [ -f docs/package.json ]; then
            mkdir -p docs/public/figures
            cp -a _generated_figures/. docs/public/figures/
          fi
          rm -rf _generated_figures

      - name: Setup Node.js
        if: ${{ hashFiles('docs/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (docs)
        if: ${{ hashFiles('docs/package.json') != '' }}
        working-directory: docs
        run: npm ci

      - name: Build site (docs)
        if: ${{ hashFiles('docs/package.json') != '' }}
        working-directory: docs
        run: npm run build --if-present

      - name: Copy build to docs/
        if: ${{ hashFiles('docs/package.json') != '' }}
        run: |
          # Copy built site from docs/dist or docs/build into a temporary folder,
          # then replace top-level docs/ with the built output. This avoids deleting
          # the source before the build artifacts are safely copied.
          if [ -d docs/dist ]; then
            mkdir -p _site
            cp -a docs/dist/. _site/
          elif [ -d docs/build ]; then
            mkdir -p _site
            cp -a docs/build/. _site/
          else
            echo "No dist or build directory found"
            exit 1
          fi

          rm -rf docs
          mkdir -p docs
          cp -a _site/. docs/
          rm -rf _site

      - name: Commit and push docs/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          # If there are no staged changes, exit successfully
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(docs): update site [skip ci]"
          git push
