name: Build and publish Astro docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (docs)
        run: |
          # Prefer npm ci when a lockfile exists, otherwise fall back to npm install
          if [ -f docs/package-lock.json ] || [ -f docs/npm-shrinkwrap.json ] || [ -f docs/yarn.lock ]; then
            npm ci --prefix docs
          else
            npm install --prefix docs
          fi

      - name: Build site (docs)
        run: npm run build --prefix docs --if-present

      - name: Copy build to docs/
        run: |
          # Copy built site from docs/dist or docs/build into a temporary folder,
          # then replace top-level docs/ with the built output. This avoids deleting
          # the source before the build artifacts are safely copied.
          if [ -d docs/dist ]; then
            mkdir -p _site
            cp -a docs/dist/. _site/
          elif [ -d docs/build ]; then
            mkdir -p _site
            cp -a docs/build/. _site/
          else
            echo "No dist or build directory found"
            exit 1
          fi

          rm -rf docs
          mkdir -p docs
          cp -a _site/. docs/
          rm -rf _site

      - name: Commit and push docs/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          # If there are no staged changes, exit successfully
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(docs): update site [skip ci]"
          git push
